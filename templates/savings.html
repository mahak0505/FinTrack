{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savings — Finly</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/shared.css' %}">
</head>
<body>

 {% include 'sidebar.html' with active_page='savings' %}

<div class="app-layout">
 

  <main class="main-content">
    <div class="page-hdr">
      <div><div class="pg-title">Savings Goals 💰</div><div class="pg-sub">Track your progress toward big purchases</div></div>
      <button class="btn-primary" style="width:auto; padding: 8px 16px;" onclick="openModal('newGoalModal')">+ New Goal</button>
    </div>
    
    <div class="goal-list" id="goalsCont" style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;"></div>
  </main>
</div>

<!-- Modals -->
<div class="modal-overlay" id="newGoalModal" onclick="closeModals()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr"><div class="modal-title">New Savings Goal</div><button class="modal-close" onclick="closeModals()">×</button></div>
    <div class="frm-grp"><label class="frm-lbl">Goal Name</label><input type="text" class="frm-inp" id="gn"></div>
    <div class="frm-grp"><label class="frm-lbl">Target Amount</label><input type="number" class="frm-inp" id="gt"></div>
    <button class="btn-primary" onclick="saveNewG()">Create</button>
  </div>
</div>

<div class="modal-overlay" id="addFundModal" onclick="closeModals()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr"><div class="modal-title">Add Funds to Goal</div><button class="modal-close" onclick="closeModals()">×</button></div>
    <input type="hidden" id="fundId">
    <div class="frm-grp"><label class="frm-lbl">Amount to add (₹)</label><input type="number" class="frm-inp" id="fundAmt"></div>
    <button class="btn-primary" onclick="processFund()">Add Funds</button>
  </div>
</div>

<script src="{% static 'js/store.js' %}"></script>
<script>
function renderGoals() {
  const goals = Store.get('goals');
  const cont = document.getElementById('goalsCont');
  let html = '';
  goals.forEach(g => {
    const pct = Math.min(100, Math.round((g.current / g.target) * 100));
    html += `
    <div class="chart-card">
      <div class="goal-hdr"><span class="goal-name" style="font-size:1.1rem">${g.name}</span><span class="goal-pct" style="font-size:1.2rem; color:${g.colors[0]}">${pct}%</span></div>
      <div class="goal-bar-bg" style="height:12px; margin: 15px 0;"><div class="goal-bar-fill" style="width:${pct}%;background:linear-gradient(135deg,${g.colors[0]},${g.colors[1]});"></div></div>
      <div class="goal-meta" style="font-size:.85rem; margin-bottom: 20px;"><span><strong style="color:var(--white)">₹${g.current}</strong> saved</span><span><strong style="color:var(--white)">₹${g.target}</strong> target</span></div>
      <button class="btn-primary" style="background:var(--white-08);" onclick="openFundModal('${g.id}')">Add Funds +</button>
    </div>`;
  });
  cont.innerHTML = html;
}

function saveNewG() {
  const n = document.getElementById('gn').value;
  const t = document.getElementById('gt').value;
  if(n && t) { Store.addGoal(n, t); closeModals(); renderGoals(); }
}

function openFundModal(id) {
  document.getElementById('fundId').value = id;
  document.getElementById('fundAmt').value = '';
  openModal('addFundModal');
}

function processFund() {
  const id = document.getElementById('fundId').value;
  const amt = parseFloat(document.getElementById('fundAmt').value);
  if(!amt) return;
  const goals = Store.get('goals');
  const goal = goals.find(g => g.id === id);
  if(goal) {
    goal.current += amt;
    Store.set('goals', goals);
    closeModals();
    renderGoals();
  }
}

document.addEventListener('DOMContentLoaded', renderGoals);
</script>
</body>
</html>
