{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Finly</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/shared.css' %}">
</head>
<body>

 {% include 'sidebar.html' with active_page='profile' %}

<div class="app-layout">
 
  <main class="main-content">
    <div class="page-hdr">
      <div><div class="pg-title">User Profile 👤</div><div class="pg-sub">Your basic account information</div></div>
    </div>
    
    <div class="chart-card" style="max-width: 600px; display:flex; flex-direction:column; align-items:center; gap: 1.5rem; padding: 3rem; margin: 0 auto; margin-top: 2rem;">
      <div id="pAv" style="width: 100px; height: 100px; background: var(--gradient-blue); border-radius: 30px; display:flex; align-items:center; justify-content:center; font-size: 2.5rem; font-weight:700; font-family:'Sora',sans-serif; box-shadow: 0 10px 30px rgba(37,99,235,0.4);">AZ</div>
      <div style="text-align:center;">
        <div id="pName" style="font-family:'Sora',sans-serif; font-size: 1.8rem; font-weight:700; color:var(--white); margin-bottom:12px;">Ansh Zamde</div>
        <div style="font-size: .95rem; color:var(--text-sub); display:flex; align-items:center; justify-content:center; gap:12px;">
          <span>🎓 <span id="pCol">IET DAVV</span></span>
          <span>·</span>
          <span>📍 <span id="pLoc">UK</span></span>
        </div>
      </div>
      
      <div style="width:100%; height:1px; background:var(--border-subtle); margin: 1.5rem 0;"></div>
      
      <div style="width:100%; display:grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; text-align:center;">
        <div style="background:var(--white-04); border:1px solid var(--border-subtle); padding: 1.5rem; border-radius:16px;">
          <div style="font-size: .75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Total Spent</div>
          <div id="pExp" style="font-size: 1.5rem; font-weight:700; font-family:'Sora',sans-serif;">₹0</div>
        </div>
        <div style="background:var(--white-04); border:1px solid var(--border-subtle); padding: 1.5rem; border-radius:16px;">
          <div style="font-size: .75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Total Saved</div>
          <div id="pSav" style="font-size: 1.5rem; font-weight:700; font-family:'Sora',sans-serif; color:var(--blue-sky);">₹0</div>
        </div>
      </div>
      
      <a href=" {% url 'settings' %}" class="btn-primary" style="text-align:center; text-decoration:none; margin-top:1.5rem; width: 80%;">✏️ Edit Profile in Settings</a>
    </div>
  </main>
</div>

<script src="{% static 'js/store.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const p = Store.get('profile');
  document.getElementById('pAv').textContent = p.initials;
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pCol').textContent = p.college;
  document.getElementById('pLoc').textContent = p.address;
  
  const exps = Store.get('expenses');
  const goals = Store.get('goals');
  
  const totExp = exps.reduce((a,c)=>a+c.amt,0);
  const totSav = goals.reduce((a,c)=>a+c.current,0);
  
  document.getElementById('pExp').textContent = Store.formatMoney(totExp);
  document.getElementById('pSav').textContent = Store.formatMoney(totSav);
});
</script>
</body>
</html>
