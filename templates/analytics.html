{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Finly</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/shared.css' %}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="topbar">
  <a href="{% url 'dashboard' %}" class="tb-logo"><div class="logo-icon"><svg viewBox="0 0 22 22" fill="none" style="width:17px;height:17px;"><rect x="3" y="3" width="2.5" height="16" rx="1" fill="white"/><rect x="3" y="3" width="11" height="2.5" rx="1" fill="white"/><rect x="3" y="9.5" width="8" height="2.5" rx="1" fill="white"/><path d="M14 10 L18 6 M18 6 L15.5 6 M18 6 L18 8.5" stroke="rgba(255,255,255,0.75)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="logo-name">fin<span>ly</span></span></a>
  <div class="tb-right">
    <div class="tb-notif" onclick="document.getElementById('notifDropdown').classList.toggle('active'); event.stopPropagation();">🔔<div class="notif-badge"></div><div class="dropdown" id="notifDropdown" onclick="event.stopPropagation()"></div></div>
    <a href="{% url 'profile' %}" class="tb-av" style="text-decoration:none; color:inherit;">AZ</a>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sb-profile">
      <div class="sb-av">AZ</div><div><div class="sb-name">Ansh Zamde</div><div class="sb-college">IET DAVV · Address</div></div>
    </div>
    <div class="sb-section">Main</div>
     <a href="{% url 'dashboard' %}" class="sb-item">📊 Dashboard</a>
<a href="{% url 'expenses' %}" class="sb-item">💳 Expenses</a>
<a href="{% url 'budget_goals' %}" class="sb-item">🎯 Budget Goals</a>
<a href="{% url 'savings' %}" class="sb-item">💰 Savings</a>

<div class="sb-section">Intelligence</div>
<a href="{% url 'ai_advisor' %}" class="sb-item">🤖 AI Advisor</a>
<a href="{% url 'analytics' %}" class="sb-item">📈 Analytics</a>
<a href="{% url 'insights' %}" class="sb-item">💡 Insights</a>

<div class="sb-section">Account</div>
<a href="{% url 'settings' %}" class="sb-item">⚙️ Settings</a>
<a href="{% url 'help' %}" class="sb-item">❓ Help</a>
<a href="{% url 'logout' %}" class="sb-item" style="color: #ef4444; margin-top: 10px;">
  <span class="sb-item-ico">🚪</span> Logout
  </a>
  </aside>

  <main class="main-content">
    <div class="page-hdr">
      <div><div class="pg-title">Analytics 📈</div><div class="pg-sub">Visual breakdown of your financial data</div></div>
    </div>
    
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
      <div class="chart-card">
        <div class="chart-hdr"><span class="chart-title">Spending History</span></div>
        <div style="width:100%; height:300px;"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-hdr"><span class="chart-title">By Category</span></div>
        <div style="width:100%; height:300px; display:flex; justify-content:center; align-items:center;">
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="{% static 'js/store.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const exps = Store.get('expenses').sort((a,b) => new Date(a.date) - new Date(b.date));
  
  Chart.defaults.color = 'rgba(255,255,255,0.7)';
  Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";

  // Prep Line Data
  const dateMap = {};
  exps.forEach(e => {
    const d = new Date(e.date).toLocaleDateString();
    dateMap[d] = (dateMap[d] || 0) + e.amt;
  });
  
  const ctx1 = document.getElementById('lineChart');
  new Chart(ctx1, {
    type: 'line',
    data: {
      labels: Object.keys(dateMap),
      datasets: [{
        label: 'Expenses (₹)',
        data: Object.values(dateMap),
        borderColor: '#3B82F6',
        backgroundColor: 'rgba(59,130,246,0.1)',
        borderWidth: 3,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, grid: {color: 'rgba(255,255,255,0.05)'} },
        x: { grid: {color: 'rgba(255,255,255,0.05)'} }
      }
    }
  });

  // Prep Pie Data
  const catMap = {};
  exps.forEach(e => { catMap[e.cat] = (catMap[e.cat] || 0) + e.amt; });
  const bgColors = ['#3B82F6', '#10B981', '#F59E0B', '#A78BFA', '#F87171', '#14B8A6'];
  
  const ctx2 = document.getElementById('pieChart');
  new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: Object.keys(catMap),
      datasets: [{
        data: Object.values(catMap),
        backgroundColor: bgColors,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } }
    }
  });
});
</script>
</body>
</html>
