{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Finly</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/shared.css' %}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

 {% include 'sidebar.html' with active_page='analytics' %}
<div class="app-layout">
 

  <main class="main-content">
    <div class="page-hdr">
      <div><div class="pg-title">Analytics 📈</div><div class="pg-sub">Visual breakdown of your financial data</div></div>
    </div>
    
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
      <div class="chart-card">
        <div class="chart-hdr"><span class="chart-title">Spending History</span></div>
        <div style="width:100%; height:300px;"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-hdr"><span class="chart-title">By Category</span></div>
        <div style="width:100%; height:300px; display:flex; justify-content:center; align-items:center;">
          <canvas id="pieChart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="{% static 'js/store.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const exps = Store.get('expenses').sort((a,b) => new Date(a.date) - new Date(b.date));
  
  Chart.defaults.color = 'rgba(255,255,255,0.7)';
  Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";

  // Prep Line Data
  const dateMap = {};
  exps.forEach(e => {
    const d = new Date(e.date).toLocaleDateString();
    dateMap[d] = (dateMap[d] || 0) + e.amt;
  });
  
  const ctx1 = document.getElementById('lineChart');
  new Chart(ctx1, {
    type: 'line',
    data: {
      labels: Object.keys(dateMap),
      datasets: [{
        label: 'Expenses (₹)',
        data: Object.values(dateMap),
        borderColor: '#3B82F6',
        backgroundColor: 'rgba(59,130,246,0.1)',
        borderWidth: 3,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, grid: {color: 'rgba(255,255,255,0.05)'} },
        x: { grid: {color: 'rgba(255,255,255,0.05)'} }
      }
    }
  });

  // Prep Pie Data
  const catMap = {};
  exps.forEach(e => { catMap[e.cat] = (catMap[e.cat] || 0) + e.amt; });
  const bgColors = ['#3B82F6', '#10B981', '#F59E0B', '#A78BFA', '#F87171', '#14B8A6'];
  
  const ctx2 = document.getElementById('pieChart');
  new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: Object.keys(catMap),
      datasets: [{
        data: Object.values(catMap),
        backgroundColor: bgColors,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } }
    }
  });
});
</script>
</body>
</html>
