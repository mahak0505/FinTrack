<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights — Finly</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
.insight-card { background: var(--white-04); border: 1px solid var(--border-subtle); padding: 1.5rem; border-radius: 14px; margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 1rem; }
.insight-ico { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.insight-body { flex:1; }
.insight-title { font-weight: 600; color: var(--white); margin-bottom: 5px; font-family: 'Sora', sans-serif;}
.insight-text { font-size: .85rem; color: var(--white-70); line-height: 1.6; }
.insight-text strong { color: var(--blue-sky); }
</style>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="tb-logo"><div class="logo-icon"><svg viewBox="0 0 22 22" fill="none" style="width:17px;height:17px;"><rect x="3" y="3" width="2.5" height="16" rx="1" fill="white"/><rect x="3" y="3" width="11" height="2.5" rx="1" fill="white"/><rect x="3" y="9.5" width="8" height="2.5" rx="1" fill="white"/><path d="M14 10 L18 6 M18 6 L15.5 6 M18 6 L18 8.5" stroke="rgba(255,255,255,0.75)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="logo-name">fin<span>ly</span></span></a>
  <div class="tb-right">
    <div class="tb-notif" onclick="document.getElementById('notifDropdown').classList.toggle('active'); event.stopPropagation();">🔔<div class="notif-badge"></div><div class="dropdown" id="notifDropdown" onclick="event.stopPropagation()"></div></div>
    <a href="profile.html" class="tb-av" style="text-decoration:none; color:inherit;">AZ</a>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sb-profile">
      <div class="sb-av">AZ</div><div><div class="sb-name">Ansh Zamde</div><div class="sb-college">IET DAVV · Address</div></div>
    </div>
    <div class="sb-section">Main</div>
    <a href="dashboard.html" class="sb-item"><span class="sb-item-ico">📊</span> Dashboard</a>
    <a href="expenses.html" class="sb-item"><span class="sb-item-ico">💳</span> Expenses</a>
    <a href="budget-goals.html" class="sb-item"><span class="sb-item-ico">🎯</span> Budget Goals</a>
    <a href="savings.html" class="sb-item"><span class="sb-item-ico">💰</span> Savings</a>
    <div class="sb-section">Intelligence</div>
    <a href="ai-advisor.html" class="sb-item"><span class="sb-item-ico">🤖</span> AI Advisor <span class="sb-badge">NEW</span></a>
    <a href="analytics.html" class="sb-item"><span class="sb-item-ico">📈</span> Analytics</a>
    <a href="insights.html" class="sb-item active"><span class="sb-item-ico">💡</span> Insights</a>
    <div class="sb-section">Account</div>
    <a href="settings.html" class="sb-item"><span class="sb-item-ico">⚙️</span> Settings</a>
    <a href="help.html" class="sb-item"><span class="sb-item-ico">❓</span> Help</a>
  </aside>

  <main class="main-content">
    <div class="page-hdr">
      <div><div class="pg-title">Smart Insights 💡</div><div class="pg-sub">AI-driven data analysis based on your activity</div></div>
    </div>
    
    <div id="insightsBox" style="max-width: 800px;">
      <!-- Generated by JS -->
    </div>
  </main>
</div>

<script src="js/store.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const exps = Store.get('expenses');
  const buds = Store.get('budgets');
  const incs = Store.get('income');
  const box = document.getElementById('insightsBox');
  let html = '';
  
  const spentThisMonth = exps.reduce((acc, curr) => acc + curr.amt, 0);
  const incTotal = incs.reduce((acc, curr) => acc + curr.amt, 0);
  
  const catTotals = {};
  exps.forEach(e => { catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amt; });
  const sortedCats = Object.keys(catTotals).sort((a,b)=>catTotals[b]-catTotals[a]);
  const topCat = sortedCats[0];
  
  if(!exps.length) {
    box.innerHTML = '<div class="no-data">Not enough data to generate insights yet. Start adding expenses!</div>';
    return;
  }

  // Insight 1: Spending Pace
  let i1Icon = '📈'; let i1Color = 'var(--warn)';
  let i1Title = 'Spending Pace';
  let i1Desc = `You've spent <strong>₹${spentThisMonth}</strong> far this month. At this rate, ensure you stay within your overall budget limits.`;
  html += `<div class="insight-card"><div class="insight-ico" style="background:rgba(245,158,11,.1); color:${i1Color}">${i1Icon}</div><div class="insight-body"><div class="insight-title">${i1Title}</div><div class="insight-text">${i1Desc}</div></div></div>`;

  // Insight 2: Top Category Warning/Praise
  if(topCat) {
    let limit = buds[topCat] || Infinity;
    let spentCat = catTotals[topCat];
    let catIco = '🍔'; let catCol = 'var(--blue-sky)';
    let pct = (spentCat/limit)*100;
    let desc = `Your highest expense category is <strong>${topCat}</strong> at <strong>₹${spentCat}</strong>.`;
    if(pct > 80) { desc += ` This is dangerously close to your budget limit of ₹${limit}. Consider cutting back for the rest of the month.`; catCol='var(--danger)'; catIco='⚠️'; }
    html += `<div class="insight-card"><div class="insight-ico" style="background:rgba(59,130,246,.1); color:${catCol}">${catIco}</div><div class="insight-body"><div class="insight-title">${topCat} Spending</div><div class="insight-text">${desc}</div></div></div>`;
  }
  
  // Insight 3: Net Cashflow
  if(incTotal > 0) {
    let ratio = (spentThisMonth / incTotal) * 100;
    let txt = `Your expense to income ratio is <strong>${Math.round(ratio)}%</strong>. `;
    if(ratio < 50) txt += "Excellent job keeping expenses low compared to your income!";
    else txt += "You're spending a large chunk of your income. Start allocating more towards your savings goals.";
    html += `<div class="insight-card"><div class="insight-ico" style="background:rgba(16,185,129,.1); color:#10B981">⚖️</div><div class="insight-body"><div class="insight-title">Cashflow Health</div><div class="insight-text">${txt}</div></div></div>`;
  }

  box.innerHTML = html;
});
</script>
</body>
</html>
